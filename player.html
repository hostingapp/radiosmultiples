<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta
name="theme-color"
content="#0f172a">

<title>PLAYER | RADIOS MULTIPLES</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* 🔥 RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* 🔥 BODY */

html,
body{

width:100%;
min-height:100%;
overflow-x:hidden;

font-family:
'Poppins',
sans-serif;

background:
linear-gradient(
180deg,
#020617,
#0f172a
);

color:#fff;

}

/* 🔥 PLAYER */

.player-page{

width:100%;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}

/* 🔥 CARD */

.player-card{

position:relative;

width:100%;
max-width:430px;

background:
linear-gradient(
180deg,
#1e293b,
#111827
);

border-radius:34px;

padding:30px 24px;

text-align:center;

overflow:hidden;

border:
1px solid rgba(255,255,255,.06);

box-shadow:
0 10px 40px rgba(0,0,0,.45);

}

/* 🔥 EFECTO */

.player-card::before{

content:"";

position:absolute;

width:250px;
height:250px;

background:
rgba(255,255,255,.03);

border-radius:50%;

top:-120px;
right:-80px;

}

/* 🔥 BACK */

.top-bar{

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:20px;

position:relative;
z-index:2;

}

.back-btn{

width:46px;
height:46px;

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

background:
rgba(255,255,255,.06);

font-size:20px;

cursor:pointer;

text-decoration:none;

color:#fff;

}

/* 🔥 LOGO */

.logo-wrap{

position:relative;
z-index:2;

}

.logo{

width:210px;
height:210px;

object-fit:cover;

border-radius:32px;

margin:auto;

display:block;

border:
4px solid rgba(255,255,255,.08);

box-shadow:
0 12px 30px rgba(0,0,0,.45);

background:#fff;

}

/* 🔥 LIVE */

.live-badge{

display:inline-flex;
align-items:center;
gap:8px;

margin-top:18px;

padding:8px 16px;

border-radius:999px;

background:
rgba(239,68,68,.15);

color:#ff4d4d;

font-size:13px;
font-weight:700;

letter-spacing:1px;

}

.live-dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff4d4d;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* 🔥 INFO */

.radio-name{

margin-top:24px;

font-size:28px;
font-weight:800;

line-height:1.2;

position:relative;
z-index:2;

}

.radio-country{

margin-top:10px;

font-size:15px;

color:#94a3b8;

font-weight:500;

}

/* 🔥 PLAYER BOX */

.player-box{

margin-top:30px;

padding:22px;

border-radius:28px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

position:relative;
z-index:2;

}

/* 🔥 AUDIO */

audio{

width:100%;
height:54px;

border-radius:14px;

}

/* 🔥 STATUS */

.status{

margin-top:16px;

font-size:13px;

color:#cbd5e1;

}

/* 🔥 BUTTONS */

.action-buttons{

display:flex;
justify-content:center;
gap:14px;

margin-top:22px;

flex-wrap:wrap;

}

.action-btn{

padding:14px 20px;

border-radius:18px;

background:
#334155;

border:none;

color:#fff;

font-weight:700;

font-size:14px;

cursor:pointer;

transition:.2s;

}

.action-btn:hover{

transform:translateY(-2px);

}

/* 🔥 LOADER */

.loader{

margin-top:15px;

font-size:13px;

color:#38bdf8;

display:none;

}

/* 🔥 MOBILE */

@media(max-width:480px){

.player-card{

padding:24px 18px;

border-radius:28px;

}

.logo{

width:180px;
height:180px;

}

.radio-name{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="player-page">

<div class="player-card">

<!-- 🔥 TOP -->

<div class="top-bar">

<a
href="index.html"
class="back-btn">

←

</a>

</div>

<!-- 🔥 LOGO -->

<div class="logo-wrap">

<img
id="logo"
class="logo"
src="">

</div>

<!-- 🔥 LIVE -->

<div class="live-badge">

<div class="live-dot"></div>

EN VIVO

</div>

<!-- 🔥 NAME -->

<div
id="name"
class="radio-name">

Cargando...

</div>

<!-- 🔥 COUNTRY -->

<div
id="country"
class="radio-country">

</div>

<!-- 🔥 PLAYER -->

<div class="player-box">

<audio
id="audio"
controls
autoplay
playsinline>

</audio>

<div
id="status"
class="status">

Conectando stream...

</div>

<div
id="loader"
class="loader">

Cargando audio...

</div>

<div class="action-buttons">

<button
class="action-btn"
onclick="togglePlay()">

▶ PLAY / PAUSE

</button>

<button
class="action-btn"
onclick="reloadStream()">

⟳ RECARGAR

</button>

</div>

</div>

</div>

</div>

<script>

/* 🔥 PARAMETROS */

const params =
new URLSearchParams(
window.location.search
);

const nombre =
decodeURIComponent(
params.get("nombre") || ""
);

const logo =
decodeURIComponent(
params.get("logo") || ""
);

let stream =
decodeURIComponent(
params.get("stream") || ""
);

const pais =
decodeURIComponent(
params.get("pais") || ""
);

/* 🔥 ELEMENTOS */

const audio =
document.getElementById("audio");

const logoImg =
document.getElementById("logo");

const statusText =
document.getElementById("status");

const loader =
document.getElementById("loader");

/* 🔥 DATOS */

document
.getElementById("name")
.innerText = nombre;

document
.getElementById("country")
.innerText = pais;

logoImg.src =
logo || "https://via.placeholder.com/300";

/* 🔥 STREAM FIX */

stream = stream.trim();

/* 🔥 HTTPS FIX */

if(
location.protocol === "https:" &&
stream.startsWith("http://")
){

statusText.innerHTML =
"⚠ El stream usa HTTP y puede bloquearse en algunas apps.";

}

/* 🔥 LOAD STREAM */

function loadStream(){

loader.style.display =
"block";

audio.src = stream;

audio.load();

const playPromise =
audio.play();

if(playPromise !== undefined){

playPromise
.then(()=>{

statusText.innerHTML =
"🟢 Reproduciendo en vivo";

loader.style.display =
"none";

})
.catch(()=>{

statusText.innerHTML =
"❌ No se pudo reproducir el stream";

loader.style.display =
"none";

});

}

}

/* 🔥 PLAY / PAUSE */

function togglePlay(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

/* 🔥 RECARGAR */

function reloadStream(){

statusText.innerHTML =
"🔄 Reconectando stream...";

loadStream();

}

/* 🔥 EVENTOS */

audio.addEventListener(
"playing",
()=>{

statusText.innerHTML =
"🟢 Reproduciendo en vivo";

}
);

audio.addEventListener(
"waiting",
()=>{

statusText.innerHTML =
"⏳ Cargando stream...";

}
);

audio.addEventListener(
"error",
()=>{

statusText.innerHTML =
"❌ Stream incompatible o fuera de línea";

}
);

/* 🔥 SEGUNDO PLANO */

document.addEventListener(
"visibilitychange",
()=>{

if(
!document.hidden &&
audio.paused
){

audio.play()
.catch(()=>{});

}

}
);

/* 🔥 START */

loadStream();

</script>

</body>
</html>
