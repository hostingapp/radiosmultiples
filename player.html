<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta
name="theme-color"
content="#0f172a">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link

rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Reproductor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
font-family:'Poppins',sans-serif;
background:#020617;
overflow:hidden;
color:#fff;
}

body{
display:flex;
align-items:center;
justify-content:center;
padding:20px;

background-image:
linear-gradient(
rgba(2,6,23,.88),
rgba(2,6,23,.94)
),
url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");

background-size:cover;
background-position:center;
}

.player-card{

width:100%;
max-width:340px;

background:rgba(15,23,42,.90);

backdrop-filter:blur(18px);

border-radius:28px;

padding:22px 18px;

box-shadow:
0 10px 40px rgba(0,0,0,.45);

border:1px solid rgba(255,255,255,.08);

text-align:center;
}

.player-top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:16px;
}

.top-btn{

width:38px;
height:38px;

border-radius:12px;

background:rgba(255,255,255,.08);

border:none;

color:#fff;

font-size:14px;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

transition:.25s;
}

.top-btn:hover{
transform:scale(1.05);
background:rgba(255,255,255,.14);
}

.player-logo{

width:125px;
height:125px;

object-fit:cover;

border-radius:24px;

margin:auto;

display:block;

background:#fff;

padding:5px;

box-shadow:
0 10px 30px rgba(37,99,235,.35);
}

.player-name{

margin-top:18px;

font-size:20px;

font-weight:800;

line-height:1.3;
}

.player-country{

margin-top:6px;

font-size:12px;

color:#94a3b8;

font-weight:600;
}

.player-status{

margin-top:10px;

font-size:12px;

font-weight:700;

color:#22c55e;
}

.song-title{

margin-top:10px;

font-size:13px;

}

gap:4px;
}

);

transition:

opacity .08s linear;

opacity:.9;
}

}

</style>

</head>
<body>

<div class="player-card">

<div class="player-top">

<button
class="top-btn"
onclick="volverInicio()">

<i class="fas fa-arrow-left"></i>

</button>

<button
class="top-btn"
onclick="compartirRadio()">

<i class="fas fa-share-alt"></i>

</button>

</div>

<img
id="radioLogo"
class="player-logo"
src="4008656_ico.png">

<div
class="player-name"
id="radioName">

RADIOS MULTIPLES

</div>

<div
class="player-country"
id="radioCountry">

Radio online

</div>

<div
class="player-status"
id="playerStatus">

● CONECTANDO...

</div>

<div
id="songTitle"
class="song-title">

En vivo

</div>

<div
class="visualizer"
id="visualizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="player-controls">

<button class="control-btn">
<i class="fas fa-backward-step"></i>
</button>

<button
class="control-btn play-btn"
onclick="toggleRadio()">

<i
id="playIcon"
class="fas fa-pause"></i>

</button>

<button class="control-btn">
<i class="fas fa-forward-step"></i>
</button>

</div>

<div class="player-bottom">

Escucha tu emisora favorita en vivo en Radios Multiples.

</div>

</div>

<audio
id="radioPlayer"
preload="none"
crossorigin="anonymous"
playsinline
webkit-playsinline>
</audio>

<script>

/* =========================
PARAMETROS
========================= */

const params =
new URLSearchParams(window.location.search);

const nombre =
decodeURIComponent(
params.get("nombre") || "Radio Online"
);

const logo =
decodeURIComponent(
params.get("logo") || ""
);

const stream =
decodeURIComponent(
params.get("stream") || ""
);

const pais =
decodeURIComponent(
params.get("pais") || "Radio Online"
);

/* =========================
ELEMENTOS
========================= */

const audio =
document.getElementById("radioPlayer");

const radioName =
document.getElementById("radioName");

const radioLogo =
document.getElementById("radioLogo");

const playIcon =
document.getElementById("playIcon");

const playerStatus =
document.getElementById("playerStatus");

const songTitle =
document.getElementById("songTitle");

/* =========================
INFO RADIO
========================= */

radioName.innerText = nombre;

radioLogo.src =
logo || "4008656_ico.png";

radioLogo.onerror = ()=>{

radioLogo.src =
"4008656_ico.png";

};

document.title = nombre;

document.getElementById("radioCountry")
.innerText = pais;

/* =========================
ESTADO
========================= */

let isPlaying = false;

/* =========================
INICIAR RADIO
========================= */

function iniciarRadio(){

if(!stream){

playerStatus.innerText =
"● ERROR";

songTitle.innerText =
"Stream no encontrado";

return;
}

playerStatus.innerText =
"● CONECTANDO...";

/* =========================
ANDROID APP
========================= */

if(window.Android){

audio.pause();

audio.removeAttribute("src");

Android.playRadio(stream);

isPlaying = true;

playIcon.classList.remove("fa-play");

playIcon.classList.add("fa-pause");

playerStatus.innerText =
"● REPRODUCIENDO";

return;
}

/* =========================
WEB NORMAL
========================= */

let finalStream =
stream.trim();

/* HTTP → HTTPS */
if(
location.protocol==="https:" &&
finalStream.startsWith("http://")
){

finalStream =
finalStream.replace(
"http://",
"https://"
);

}

/* EVITAR CACHE */
finalStream +=
(finalStream.includes("?") ? "&" : "?")
+
"nocache=" +
Date.now();

audio.src = finalStream;

audio.load();

audio.play()
.then(()=>{

console.log("Audio iniciado");

isPlaying = true;

playIcon.classList.remove("fa-play");

playIcon.classList.add("fa-pause");

playerStatus.innerText =
"● REPRODUCIENDO";

})
.catch((e)=>{

console.log(e);

playerStatus.innerText =
"● TOCA PLAY";

songTitle.innerText =
"Toca el botón PLAY";

});

}

/* =========================
PLAY / PAUSE
========================= */

function toggleRadio(){

if(window.Android){

Android.toggleRadio();

if(isPlaying){

playIcon.classList.remove("fa-pause");
playIcon.classList.add("fa-play");

playerStatus.innerText =
"● PAUSADO";

}else{

playIcon.classList.remove("fa-play");
playIcon.classList.add("fa-pause");

playerStatus.innerText =
"● REPRODUCIENDO";
}

isPlaying = !isPlaying;

return;
}

/* WEB */

if(isPlaying){

audio.pause();

playIcon.classList.remove("fa-pause");
playIcon.classList.add("fa-play");

playerStatus.innerText =
"● PAUSADO";

}else{

audio.play();

playIcon.classList.remove("fa-play");
playIcon.classList.add("fa-pause");

playerStatus.innerText =
"● REPRODUCIENDO";
}

isPlaying = !isPlaying;
}

/* =========================
COMPARTIR
========================= */

function compartirRadio(){

const linkPlayStore =
"https://play.google.com/store/apps/details?id=radios.multiples1&pcampaignid=web_share";

const texto =
"Escucha " + nombre +
" en Radios Multiples:\n" +
linkPlayStore;

if(window.Android && Android.compartirRadio){

Android.compartirRadio(
texto,
linkPlayStore
);

return;
}

if(navigator.share){

navigator.share({

title:nombre,

text:texto,

url:linkPlayStore

});

}else{

alert(texto);

}

}

/* =========================
VOLVER
========================= */

function volverInicio(){

if(document.referrer){

history.back();

}else{

window.location.href =
"index.html";

}

}

/* =========================
VISUALIZER
========================= */

const bars =
document.querySelectorAll(".bar");

function moverBarras(){

bars.forEach(bar=>{

const random =
Math.floor(Math.random()*60)+10;

bar.style.height =
random + "px";

});

}

setInterval(()=>{

if(isPlaying){

moverBarras();

}

},120);

/* =========================
EVENTOS AUDIO
========================= */

audio.addEventListener("waiting",()=>{

playerStatus.innerText =
"● CARGANDO...";

});

audio.addEventListener("playing",()=>{

playerStatus.innerText =
"● REPRODUCIENDO";

});

audio.addEventListener("pause",()=>{

playerStatus.innerText =
"● PAUSADO";

});

audio.addEventListener("error",()=>{

playerStatus.innerText =
"● RECONECTANDO...";

songTitle.innerText =
"Reconectando señal...";

setTimeout(()=>{

audio.load();

audio.play()
.catch(()=>{

playerStatus.innerText =
"● ERROR";

songTitle.innerText =
"Emisora no disponible";

});

},3000);

});

/* =================================
MANTENER AUDIO EN SEGUNDO PLANO
================================= */

document.addEventListener(
"visibilitychange",
()=>{

if(document.hidden){

console.log(
"APP EN SEGUNDO PLANO"
);

}else{

console.log(
"APP ACTIVA"
);

if(isPlaying){

audio.play()
.catch(()=>{});

}

}

});

/* =================================
RECUPERAR AUDIO
================================= */

window.addEventListener(
"focus",
()=>{

if(isPlaying){

audio.play()
.catch(()=>{});

}

});

/* =========================
INICIAR
========================= */

iniciarRadio();

</script>

</body>
</html>
