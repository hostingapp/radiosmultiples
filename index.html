<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta
name="theme-color"
content="#0f172a">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>RADIOS MULTIPLES</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Poppins',sans-serif;

background-image:
linear-gradient(rgba(2,6,23,.88),rgba(2,6,23,.92)),
url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:#fff;
}

/* APP */
.radio-app{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999999;
}

.loader-spinner{
width:70px;
height:70px;
border:5px solid rgba(255,255,255,.15);
border-top:5px solid #2563eb;
border-radius:50%;
animation:girar 1s linear infinite;
}

.loader-text{
margin-top:18px;
font-size:14px;
font-weight:600;
color:#fff;
}

@keyframes girar{
100%{
transform:rotate(360deg);
}
}

/* HEADER */
.app-header{
position:sticky;
top:0;
z-index:999;
width:100%;
padding:8px 10px;

background:
linear-gradient(
180deg,
rgba(15,23,42,.96),
rgba(17,24,39,.96)
);

backdrop-filter:blur(12px);

border-bottom:
1px solid rgba(255,255,255,.05);

box-shadow:
0 4px 14px rgba(0,0,0,.25);

flex-shrink:0;
}

.header-content{
display:flex;
align-items:center;
gap:10px;
}

/* LOGO */
.app-logo{
width:48px;
height:48px;
border-radius:14px;
object-fit:cover;
background:#fff;
padding:3px;
}

/* INFO */
.app-info{
display:flex;
flex-direction:column;
line-height:1.1;
}

.app-name{
font-size:14px;
font-weight:800;
letter-spacing:.5px;
text-transform:uppercase;
}

.app-subtitle{
font-size:9px;
color:rgba(255,255,255,.70);
margin-top:2px;
}

/* BOTON SALIR */
.header-exit{
width:34px;
height:34px;

display:flex;
align-items:center;
justify-content:center;

margin-left:auto;

border-radius:12px;

background:rgba(255,255,255,.08);

color:#fff;

font-size:14px;

cursor:pointer;

transition:.25s;
}

.header-exit:hover{
background:#ef4444;
transform:scale(1.05);
}
/* CONTENT */
.content{
flex:1;
overflow:hidden;
padding:14px;
display:flex;
flex-direction:column;
}

/* BUSCADOR */
.search-box{
display:flex;
align-items:center;
gap:10px;
background:rgba(17,24,39,.92);
padding:14px;
border-radius:16px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.05);
flex-shrink:0;
}

.search-box i{
color:#94a3b8;
font-size:14px;
}

.search-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
font-size:14px;
font-weight:600;
}

.search-box input::placeholder{
color:#94a3b8;
}

/* FILTRO */
#countryFilter{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:rgba(17,24,39,.90);
color:#fff;
font-size:14px;
font-weight:600;
margin-bottom:14px;
flex-shrink:0;
}

/* SECCIONES */
#countriesSection,
#radiosSection{

flex:1;

overflow-y:auto;

overflow-x:hidden;

display:flex;

flex-direction:column;

padding-bottom:120px;

-webkit-overflow-scrolling:touch;
}

/* GRID */
.country-grid,
.radio-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;
}

/* BANDERAS */
.country-grid{

height:270px;

overflow:hidden;

align-content:start;

margin-bottom:0;
}

/* EMISORAS */
.radio-grid{
align-content:start;
}

/* CARDS */
.country-card,
.radio-card{

width:100%;

min-width:0;

min-height:100px;

background:
linear-gradient(
180deg,
rgba(30,41,59,.95),
rgba(17,24,39,.95)
);

border-radius:18px;

padding:10px 6px;

text-align:center;

cursor:pointer;

transition:.25s;

border:
1px solid rgba(255,255,255,.05);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:4px;
}

.country-card:hover,
.radio-card:hover{
transform:translateY(-4px);
}

/* BANDERAS */
.country-flag img{

width:42px;

height:28px;

object-fit:cover;

border-radius:10px;

margin-bottom:8px;

background:#fff;
}

/* LOGOS */
.radio-logo{

width:60px;

height:60px;

object-fit:cover;

border-radius:18px;

margin-bottom:8px;
}

/* TEXTOS */
.country-name,
.radio-name{

font-size:9px;

font-weight:700;

line-height:1.3;

word-break:break-word;

text-align:center;

display:-webkit-box;

-webkit-line-clamp:2;

-webkit-box-orient:vertical;

overflow:hidden;
}

.country-total{

margin-top:5px;

font-size:9px;

color:#94a3b8;
}

/* TITULO */
.app-title{

text-align:center;

margin-bottom:14px;

font-size:18px;

font-weight:700;

flex-shrink:0;
}

/* PAGINACION */
.pagination{

display:flex;

justify-content:center;

gap:8px;

margin-bottom:18px;

flex-shrink:0;
}

.page-btn{

width:38px;

height:38px;

border:none;

border-radius:12px;

background:#1e293b;

color:#fff;

font-weight:700;

cursor:pointer;
}

.page-btn.active{
background:#2563eb;
}

/* NUEVAS EMISORAS */
.new-radios-section{

margin-top:0;

padding-bottom:0;

margin-bottom:10px;
}

.new-title{

font-size:14px;

font-weight:700;

margin-bottom:12px;

display:flex;

align-items:center;

gap:8px;

color:#fff;
}

.new-title i{
color:#38bdf8;
}

.new-radios-slider{

display:flex;

gap:14px;

overflow-x:auto;

padding:4px 0 0 0;

scrollbar-width:none;
}

.new-radios-slider::-webkit-scrollbar{
display:none;
}

.new-radio-card{

width:72px;

height:72px;

min-width:72px;

border-radius:50%;

overflow:hidden;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(
180deg,
rgba(30,41,59,.95),
rgba(17,24,39,.95)
);

border:
1px solid rgba(255,255,255,.06);

flex-shrink:0;

cursor:pointer;

padding:0;
}

.new-radio-card img{

width:100%;

height:100%;

object-fit:cover;

border-radius:50%;
}

.hidden{
display:none !important;
}

/* NAVBAR */
.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:68px;

background:rgba(15,23,42,.96);

backdrop-filter:blur(12px);

display:flex;

align-items:center;

justify-content:space-around;

border-top:
1px solid rgba(255,255,255,.08);

z-index:999;
}

.nav-btn{

flex:1;

height:100%;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:4px;

color:#cbd5e1;

font-size:11px;

cursor:pointer;

transition:.25s;
}

.nav-btn i{
font-size:18px;
}

.nav-btn.active{
color:#38bdf8;
}

/* PLAYER PEQUEÑO */
.floating-player{

position:fixed;

bottom:62px;

left:10px;
right:10px;

background:rgba(15,23,42,.96);

backdrop-filter:blur(14px);

border-radius:16px;

padding:6px 8px;

display:none;

align-items:center;
justify-content:space-between;

gap:8px;

z-index:99999;

box-shadow:
0 4px 14px rgba(0,0,0,.25);

border:
1px solid rgba(255,255,255,.05);
}

.player-left{

display:flex;
align-items:center;

gap:8px;

flex:1;
min-width:0;
}

.player-logo{

width:36px;
height:36px;

border-radius:10px;

object-fit:cover;

background:#fff;
}

.player-info{

display:flex;
flex-direction:column;

overflow:hidden;
}

.player-title{

font-size:10px;

font-weight:700;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.player-status{

font-size:8px;

color:#94a3b8;

margin-top:1px;
}

.player-btn{

width:34px;
height:34px;

border:none;

border-radius:50%;

background:#2563eb;

color:#fff;

font-size:12px;

cursor:pointer;

flex-shrink:0;
}

</style>
</head>

<body>

<div class="radio-app">



<div class="app-header">

<div class="header-content">

<img class="app-logo" src="4008656_ico.png">

<div class="app-info">

<div class="app-name">
RADIOS MULTIPLES
</div>

<div class="app-subtitle">
Todas las emisoras en un mismo lugar
</div>

</div>

<div class="header-exit" onclick="cerrarApp()">

<i class="fas fa-power-off"></i>

</div>

</div>

</div>

<div class="content">

<div class="search-box">

<i class="fas fa-search"></i>

<input
type="text"
id="searchInput"
placeholder="Buscar emisora o país...">

</div>

<select id="countryFilter">
<option value="">Todos los países</option>
</select>

<div id="countriesSection">

<div class="country-grid" id="countryGrid"></div>

<div class="pagination" id="pagination"></div>

<div class="new-radios-section">

<div class="new-title">
<i class="fas fa-fire"></i>
Nuevas emisoras
</div>

<div class="new-radios-slider" id="newRadiosSlider"></div>

</div>

</div>

<div id="radiosSection" class="hidden">

<div class="app-title" id="countryTitle"></div>

<div class="radio-grid" id="radioGrid"></div>

</div>

</div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">

<div class="nav-btn active" onclick="irInicio()">
<i class="fas fa-home"></i>
<span>Inicio</span>
</div>

<div class="nav-btn" onclick="abrirSoporte()">
<i class="fas fa-headset"></i>
<span>Soporte</span>
</div>

<div class="nav-btn" onclick="anadirEmisora()">
<i class="fas fa-radio"></i>
<span>Añadir</span>
</div>

<div class="nav-btn" onclick="compartirApp()">
<i class="fas fa-share-alt"></i>
<span>Compartir</span>
</div>

</div>

<!-- PLAYER -->
<div class="floating-player" id="floatingPlayer">

<div class="player-left">

<img id="playerLogo" class="player-logo">

<div class="player-info">

<div class="player-title" id="playerTitle">
Sin reproducción
</div>

<div class="player-status" id="playerStatus">
Detenido
</div>

</div>

</div>

<button class="player-btn" onclick="toggleRadio()">

<i id="playerIcon" class="fas fa-play"></i>

</button>

</div>

<audio
id="radioPlayer"
preload="none"
crossorigin="anonymous"
playsinline
webkit-playsinline>
</audio>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbwHv8vXvcn6Ag83o9bDPLRPTs1Q_bfIfxP6udf_eEbDXwkO-ycD9f6vQ6H7IF81WElDtA/exec";

const countryGrid=document.getElementById("countryGrid");
const radioGrid=document.getElementById("radioGrid");
const countriesSection=document.getElementById("countriesSection");
const radiosSection=document.getElementById("radiosSection");
const countryTitle=document.getElementById("countryTitle");
const countryFilter=document.getElementById("countryFilter");
const pagination=document.getElementById("pagination");
const searchInput=document.getElementById("searchInput");

const audio=document.getElementById("radioPlayer");

let radios=[];
let currentPage=1;
let isPlaying=false;

const itemsPerPage=6;

/* BANDERAS */
function banderaPais(pais){

if(!pais)return "flags/un.png";

pais=pais.toLowerCase()
.trim()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

const flags={

"argentina":"ar",
"bolivia":"bo",
"brasil":"br",
"brazil":"br",
"canada":"ca",
"chile":"cl",
"colombia":"co",
"costa rica":"cr",
"cuba":"cu",
"ecuador":"ec",
"el salvador":"sv",
"espana":"es",
"españa":"es",
"estados unidos":"us",
"usa":"us",
"guatemala":"gt",
"honduras":"hn",
"mexico":"mx",
"méxico":"mx",
"nicaragua":"ni",
"panama":"pa",
"panamá":"pa",
"paraguay":"py",
"peru":"pe",
"perú":"pe",
"puerto rico":"pr",
"republica dominicana":"do",
"república dominicana":"do",
"uruguay":"uy",
"venezuela":"ve"

};

const code=flags[pais]||"un";

return `flags/${code}.png`;

}

/* CARGAR */
fetch(sheetURL)

.then(res=>res.json())

.then(data=>{

radios=data.aprobadas || [];

radios.reverse();

crearFiltro();

mostrarNuevasRadios();

mostrarPaises();

document.getElementById("loader").style.display="none";

})

.catch(err=>console.log(err));

/* FILTRO */
function crearFiltro(){

const paises=[];

radios.forEach(r=>{

const p=r.pais;

if(p && !paises.includes(p)){

paises.push(p);

}

});

paises.sort();

paises.forEach(p=>{

const option=document.createElement("option");

option.value=p;
option.textContent=p;

countryFilter.appendChild(option);

});

}

/* NUEVAS */
function mostrarNuevasRadios(){

const slider=document.getElementById("newRadiosSlider");

slider.innerHTML="";

const nuevas=radios.slice(0,10);

nuevas.forEach(r=>{

const div=document.createElement("div");

div.className="new-radio-card";

div.innerHTML=`<img src="${r.logo}">`;

div.onclick=()=>{

playRadio(
r.nombre || "",
r.logo || "",
r.stream || ""
);

};

slider.appendChild(div);

});

}

/* MOSTRAR */
function mostrarPaises(){

countryGrid.innerHTML="";
radioGrid.innerHTML="";

const filtro=countryFilter.value;

const busqueda=searchInput.value.toLowerCase().trim();

const paises={};

let radiosEncontradas=[];

radios.forEach(r=>{

const p=r.pais || "Otros";

const coincidePais=
p.toLowerCase().includes(busqueda);

const coincideRadio=
(r.nombre || "")
.toLowerCase()
.includes(busqueda);

if(filtro && p!==filtro)return;

if(busqueda){

if(coincideRadio){

radiosEncontradas.push(r);

}

if(!coincidePais && !coincideRadio){
return;
}

}

paises[p]=(paises[p]||0)+1;

});

/* RESULTADOS */
if(busqueda && radiosEncontradas.length>0){

countriesSection.classList.add("hidden");

radiosSection.classList.remove("hidden");

countryTitle.innerHTML=`Resultados encontrados`;

radiosEncontradas.forEach(r=>{

const div=document.createElement("div");

div.className="radio-card";

div.innerHTML=`

<img class="radio-logo" src="${r.logo}">

<div class="radio-name">${r.nombre}</div>

`;

div.onclick=()=>{

playRadio(
r.nombre || "",
r.logo || "",
r.stream || ""
);

};

radioGrid.appendChild(div);

});

return;

}

/* PAISES */
radiosSection.classList.add("hidden");

countriesSection.classList.remove("hidden");

const arr=Object.entries(paises);

const totalPages=Math.ceil(arr.length/itemsPerPage);

const start=(currentPage-1)*itemsPerPage;

const current=arr.slice(start,start+itemsPerPage);

current.forEach(i=>{

const div=document.createElement("div");

div.className="country-card";

div.onclick=()=>mostrarRadiosPais(i[0]);

div.innerHTML=`

<div class="country-flag">
<img src="${banderaPais(i[0])}">
</div>

<div class="country-name">${i[0]}</div>

<div class="country-total">${i[1]} emisoras</div>

`;

countryGrid.appendChild(div);

});

crearPaginacion(totalPages);

}

/* PAGINACION */
function crearPaginacion(total){

pagination.innerHTML="";

for(let i=1;i<=total;i++){

const b=document.createElement("button");

b.className="page-btn";

if(i===currentPage){

b.classList.add("active");

}

b.innerText=i;

b.onclick=()=>{

currentPage=i;

mostrarPaises();

};

pagination.appendChild(b);

}

}

/* RADIOS */
function mostrarRadiosPais(pais){

countriesSection.classList.add("hidden");

radiosSection.classList.remove("hidden");

countryTitle.innerHTML=`

<img src="${banderaPais(pais)}"
style="width:38px;height:28px;border-radius:8px;margin-right:10px;vertical-align:middle;">

${pais}

`;

radioGrid.innerHTML="";

const lista=radios.filter(r=>(r.pais||"Otros")===pais);

lista.forEach(r=>{

const div=document.createElement("div");

div.className="radio-card";

div.innerHTML=`

<img class="radio-logo" src="${r.logo}">

<div class="radio-name">${r.nombre}</div>

`;

div.onclick=()=>{

playRadio(
r.nombre || "",
r.logo || "",
r.stream || ""
);

};

radioGrid.appendChild(div);

});

}

/* PLAYER */
function playRadio(nombre,logo,stream){

if(!stream)return;

document.getElementById("floatingPlayer").style.display="flex";

document.getElementById("playerTitle").innerText=nombre;

document.getElementById("playerLogo").src=logo;

document.getElementById("playerStatus").innerText="Conectando...";

localStorage.setItem("radio_nombre",nombre);
localStorage.setItem("radio_logo",logo);
localStorage.setItem("radio_stream",stream);

audio.pause();

audio.src="";

let finalStream=stream.trim();

if(
location.protocol==="https:" &&
finalStream.startsWith("http://")
){

finalStream=
finalStream.replace(
"http://",
"https://"
);

}

finalStream +=
(finalStream.includes("?") ? "&" : "?")
+
"nocache=" +
Date.now();

/* ANDROID */
if(window.Android){

Android.playRadio(finalStream);

isPlaying=true;

document.getElementById("playerIcon")
.classList.replace("fa-play","fa-pause");

document.getElementById("playerStatus")
.innerText="Reproduciendo";

return;

}

/* WEB */
audio.src=finalStream;

audio.load();

audio.play()

.then(()=>{

isPlaying=true;

document.getElementById("playerIcon")
.classList.replace("fa-play","fa-pause");

document.getElementById("playerStatus")
.innerText="Reproduciendo";

})

.catch(()=>{

document.getElementById("playerStatus")
.innerText="Error de reproducción";

});

}

/* PLAY / PAUSE */
function toggleRadio(){

const icon=
document.getElementById("playerIcon");

const status=
document.getElementById("playerStatus");

/* APP */
if(window.Android){

Android.toggleRadio();

if(isPlaying){

icon.classList.replace(
"fa-pause",
"fa-play"
);

status.innerText="Pausado";

}else{

icon.classList.replace(
"fa-play",
"fa-pause"
);

status.innerText="Reproduciendo";

}

isPlaying=!isPlaying;

return;
}

/* WEB */
if(isPlaying){

audio.pause();

icon.classList.replace(
"fa-pause",
"fa-play"
);

status.innerText="Pausado";

}else{

audio.play();

icon.classList.replace(
"fa-play",
"fa-pause"
);

status.innerText="Reproduciendo";

}

isPlaying=!isPlaying;

}

/* EVENTOS */
audio.addEventListener("waiting",()=>{

document.getElementById("playerStatus")
.innerText="Cargando...";

});

audio.addEventListener("playing",()=>{

document.getElementById("playerStatus")
.innerText="Reproduciendo";

});

audio.addEventListener("pause",()=>{

if(!isPlaying){

document.getElementById("playerStatus")
.innerText="Pausado";

}

});

audio.addEventListener("error",()=>{

document.getElementById("playerStatus")
.innerText="Error";

isPlaying=false;

document.getElementById("playerIcon")
.classList.replace("fa-pause","fa-play");

});

/* SEGUNDO PLANO */
document.addEventListener(
"visibilitychange",
()=>{

if(!document.hidden && isPlaying){

audio.play().catch(()=>{});

}

});

window.addEventListener(
"focus",
()=>{

if(isPlaying){

audio.play().catch(()=>{});

}

});

/* RECUPERAR RADIO */
window.addEventListener("load",()=>{

const nombre=
localStorage.getItem("radio_nombre");

const logo=
localStorage.getItem("radio_logo");

if(nombre){

document.getElementById("floatingPlayer")
.style.display="flex";

document.getElementById("playerTitle")
.innerText=nombre;

document.getElementById("playerLogo")
.src=logo;

document.getElementById("playerStatus")
.innerText="Lista para reproducir";

}

});

/* FILTROS */
countryFilter.addEventListener("change",()=>{

currentPage=1;

mostrarPaises();

});

searchInput.addEventListener("input",()=>{

currentPage=1;

mostrarPaises();

});

/* NAV */
function irInicio(){

location.href="index.html";

}

function abrirSoporte(){

if(window.Android){

Android.abrirWhatsApp();

return;

}

window.location.href=
"https://wa.me/584126750681?text=Hola%20necesito%20soporte";

}

function compartirApp(){

const link=
"https://play.google.com/store/apps/details?id=radios.multiples1";

const texto=
"Descarga Radios Multiples:\n"+link;

if(window.Android && Android.compartirRadio){

Android.compartirRadio(
texto,
link
);

return;

}

if(navigator.share){

navigator.share({

title:"Radios Multiples",

text:texto,

url:link

});

}else{
