<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<style>

/* 🔥 RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* 🔥 HTML */

html{

    width:100%;
    height:100%;
    overflow-x:hidden;

}

/* 🔥 BODY */

body{

    width:100%;
    min-height:100vh;

    overflow-x:hidden;

    font-family:Arial,sans-serif;

    -webkit-text-size-adjust:100%;

    background-image:
    linear-gradient(
        rgba(0,0,0,.60),
        rgba(0,0,0,.60)
    ),
    url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;

    background-attachment:fixed;

}

/* 🔥 APP */

.radio-app{

    width:100%;

    max-width:100%;

    min-height:100vh;

    padding:
    env(safe-area-inset-top)
    12px
    env(safe-area-inset-bottom);

}

/* 🔥 TOPBAR */

.topbar{

    position:sticky;

    top:0;

    z-index:999;

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:18px 16px;

    margin-bottom:20px;

    background:
    rgba(0,0,0,.35);

    backdrop-filter:
    blur(12px);

    -webkit-backdrop-filter:
    blur(12px);

    border-bottom:
    1px solid
    rgba(255,255,255,.10);

}

/* 🔥 CONTENIDO */

.topbar-left{

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    gap:10px;

    width:100%;

}

/* 🔥 LOGO */

.app-logo{

    width:95px;

    height:95px;

    border-radius:24px;

    object-fit:cover;

    box-shadow:
    0 8px 22px
    rgba(0,0,0,.35);

}

/* 🔥 NOMBRE */

.app-name{

    font-size:24px;

    font-weight:bold;

    color:#fff;

    letter-spacing:2px;

    text-transform:uppercase;

    text-align:center;

}

/* 🔥 FILTRO */

.filter-box{

    width:100%;

    margin-bottom:20px;

}

/* 🔥 SELECT */

#countryFilter{

    width:100%;

    padding:14px;

    border-radius:14px;

    outline:none;

    font-size:15px;

    font-weight:bold;

    color:#fff;

    border:1px solid
    rgba(255,255,255,.20);

    background:
    rgba(255,255,255,.10);

    backdrop-filter:
    blur(10px);

    -webkit-backdrop-filter:
    blur(10px);

}

#countryFilter option{

    color:#111;

}

/* 🔥 GRID */

.country-grid,
.radio-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(100px,1fr));

    gap:10px;

    width:100%;

}

/* 🔥 CARDS */

.country-card,
.radio-card{

    background:
    rgba(255,255,255,.10);

    backdrop-filter:
    blur(10px);

    -webkit-backdrop-filter:
    blur(10px);

    border:1px solid
    rgba(255,255,255,.18);

    border-radius:18px;

    padding:12px 8px;

    text-align:center;

    cursor:pointer;

    transition:.3s;

    width:100%;

    overflow:hidden;

}

.country-card:hover,
.radio-card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 8px 18px rgba(0,0,0,.20);

}

/* 🔥 BANDERAS */

.country-flag img{

    width:48px;

    height:34px;

    object-fit:cover;

    border-radius:6px;

    margin-bottom:8px;

}

/* 🔥 LOGO EMISORA */

.radio-logo{

    width:100%;

    max-width:75px;

    aspect-ratio:1/1;

    object-fit:cover;

    border-radius:18px;

    margin-bottom:10px;

}

/* 🔥 TEXTO */

.country-name,
.radio-name{

    font-size:12px;

    font-weight:bold;

    color:#fff;

    line-height:1.4;

    word-break:break-word;

}

.country-total{

    margin-top:6px;

    font-size:10px;

    color:#ddd;

}

/* 🔥 BOTON */

.back-btn{

    display:inline-block;

    background:
    rgba(255,255,255,.15);

    color:#fff;

    padding:12px 18px;

    border-radius:12px;

    margin-bottom:20px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;

    backdrop-filter:blur(10px);

    border:1px solid
    rgba(255,255,255,.15);

}

/* 🔥 TITULO */

.app-title{

    text-align:center;

    font-size:22px;

    font-weight:bold;

    color:#fff;

    margin-bottom:20px;

}

/* 🔥 PAGINACION */

.pagination{

    margin-top:25px;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:8px;

}

/* 🔥 BOTONES */

.page-btn{

    width:38px;

    height:38px;

    border:none;

    border-radius:10px;

    font-weight:bold;

    cursor:pointer;

    color:#fff;

    background:
    rgba(255,255,255,.10);

    border:1px solid
    rgba(255,255,255,.15);

    backdrop-filter:
    blur(10px);

}

.page-btn.active{

    background:#fff;

    color:#111;

}

/* 🔥 OCULTAR */

.hidden{

    display:none;

}

/* 🔥 APPCREATOR24 */

@media screen and (max-width:480px){

    .country-grid,
    .radio-grid{

        grid-template-columns:
        repeat(3,1fr);

        gap:8px;

    }

    .country-card,
    .radio-card{

        padding:10px 6px;

        border-radius:16px;

    }

    .radio-logo{

        max-width:65px;

    }

    .country-name,
    .radio-name{

        font-size:11px;

    }

    .app-logo{

        width:105px;

        height:105px;

    }

    .app-name{

        font-size:22px;

    }

}

</style>

</head>

<body>

<!-- 🔥 HEADER -->

<div class="topbar">

    <div class="topbar-left">

        <img
        class="app-logo"
        src="4008656_ico.png">

        <div class="app-name">

            RADIOS MULTIPLES

        </div>

    </div>

</div>
