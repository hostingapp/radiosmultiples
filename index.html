<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta
name="theme-color"
content="#0f172a">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* 🔥 RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* 🔥 BODY */

html,
body{

    width:100%;
    min-height:100%;

    overflow-x:hidden;

    font-family:
    'Poppins',
    sans-serif;

    background:
    linear-gradient(
        180deg,
        #020617,
        #0f172a
    );

    color:#fff;

}

/* 🔥 APP */

.radio-app{

    width:100%;

    min-height:100vh;

    padding-bottom:40px;

}

/* 🔥 HEADER */

.app-header{

    position:relative;

    width:100%;

    padding:
    25px 20px 30px;

    border-radius:
    0 0 35px 35px;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    box-shadow:
    0 10px 30px rgba(0,0,0,.40);

    overflow:hidden;

}

/* 🔥 EFECTO HEADER */

.app-header::before{

    content:"";

    position:absolute;

    width:220px;

    height:220px;

    background:
    rgba(255,255,255,.04);

    border-radius:50%;

    top:-80px;

    right:-80px;

}

/* 🔥 CONTENIDO */

.header-content{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:18px;

    position:relative;

    z-index:2;

}

/* 🔥 LOGO */

.app-logo{

    width:82px;

    height:82px;

    object-fit:cover;

    border-radius:24px;

    box-shadow:
    0 8px 20px rgba(0,0,0,.45);

    border:
    3px solid rgba(255,255,255,.10);

}

/* 🔥 INFO */

.app-info{

    display:flex;

    flex-direction:column;

    justify-content:center;

}

/* 🔥 NOMBRE */

.app-name{

    font-size:26px;

    font-weight:800;

    letter-spacing:2px;

    text-transform:uppercase;

    color:#fff;

}

/* 🔥 SUB */

.app-subtitle{

    margin-top:6px;

    color:
    rgba(255,255,255,.70);

    font-size:13px;

    font-weight:500;

}

/* 🔥 CONTENIDO */

.content{

    padding:18px;

}

/* 🔥 FILTRO */

.filter-box{

    margin-bottom:20px;

}

/* 🔥 SELECT */

#countryFilter{

    width:100%;

    padding:16px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    #1e293b;

    color:#fff;

    font-size:15px;

    font-weight:600;

    box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05);

}

/* 🔥 GRID */

.country-grid,
.radio-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(110px,1fr));

    gap:14px;

}

/* 🔥 CARDS */

.country-card,
.radio-card{

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(
        180deg,
        #1e293b,
        #111827
    );

    border-radius:24px;

    padding:16px 10px;

    text-align:center;

    transition:.25s;

    cursor:pointer;

    border:
    1px solid rgba(255,255,255,.05);

    box-shadow:
    0 6px 16px rgba(0,0,0,.25);

}

/* 🔥 EFECTO */

.country-card::before,
.radio-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.06),
        transparent
    );

}

/* 🔥 HOVER */

.country-card:hover,
.radio-card:hover{

    transform:
    translateY(-4px);

}

/* 🔥 BANDERAS */

.country-flag img{

    width:62px;

    height:44px;

    object-fit:cover;

    border-radius:12px;

    margin-bottom:12px;

    border:
    2px solid rgba(255,255,255,.10);

    box-shadow:
    0 5px 14px rgba(0,0,0,.35);

    background:#fff;

}

/* 🔥 LOGOS */

.radio-logo{

    width:82px;

    height:82px;

    object-fit:cover;

    border-radius:24px;

    margin-bottom:12px;

    border:
    2px solid rgba(255,255,255,.08);

    box-shadow:
    0 6px 18px rgba(0,0,0,.35);

}

/* 🔥 NOMBRES */

.country-name,
.radio-name{

    font-size:12px;

    font-weight:700;

    line-height:1.4;

    color:#fff;

    word-break:break-word;

}

/* 🔥 TOTAL */

.country-total{

    margin-top:7px;

    font-size:10px;

    color:#94a3b8;

}

/* 🔥 TITULO */

.app-title{

    text-align:center;

    margin-bottom:25px;

    font-size:24px;

    font-weight:700;

    color:#fff;

}

/* 🔥 VOLVER */

.back-btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:13px 18px;

    margin-bottom:20px;

    border-radius:18px;

    background:
    #1e293b;

    color:#fff;

    font-weight:700;

    cursor:pointer;

    box-shadow:
    0 4px 14px rgba(0,0,0,.25);

}

/* 🔥 PAGINACION */

.pagination{

    margin-top:30px;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:10px;

}

/* 🔥 BOTONES */

.page-btn{

    width:44px;

    height:44px;

    border:none;

    border-radius:16px;

    background:
    #1e293b;

    color:#fff;

    font-weight:700;

    cursor:pointer;

    transition:.2s;

}

.page-btn.active{

    background:#fff;

    color:#111827;

}

/* 🔥 OCULTAR */

.hidden{

    display:none;

}

/* 🔥 MOBILE */

@media(max-width:480px){

    .country-grid,
    .radio-grid{

        grid-template-columns:
        repeat(3,1fr);

        gap:12px;

    }

    .app-logo{

        width:72px;
        height:72px;

    }

    .app-name{

        font-size:21px;

    }

    .radio-logo{

        width:72px;
        height:72px;

    }

}

</style>

</head>

<body>

<div class="radio-app">

    <!-- 🔥 HEADER -->

    <div class="app-header">

        <div class="header-content">

            <img
            class="app-logo"
            src="4008656_ico.png">

            <div class="app-info">

                <div class="app-name">

                    RADIOS MULTIPLES

                </div>

                <div class="app-subtitle">

                    Escucha radios online en vivo

                </div>

            </div>

        </div>

    </div>

    <!-- 🔥 CONTENIDO -->

    <div class="content">

        <!-- 🔥 PAISES -->

        <div id="countriesSection">

            <!-- 🔥 FILTRO -->

            <div class="filter-box">

                <select id="countryFilter">

                    <option value="">

                        Todos los países

                    </option>

                </select>

            </div>

            <!-- 🔥 GRID -->

            <div
            class="country-grid"
            id="countryGrid"></div>

            <!-- 🔥 PAGINACION -->

            <div
            class="pagination"
            id="pagination"></div>

        </div>

        <!-- 🔥 EMISORAS -->

        <div
        id="radiosSection"
        class="hidden">

            <div
            class="back-btn"
            onclick="volverPaises()">

                ← Volver

            </div>

            <div
            class="app-title"
            id="countryTitle"></div>

            <div
            class="radio-grid"
            id="radioGrid"></div>

        </div>

    </div>

</div>

<!-- 🔥 PAPAPARSE -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

// 🔥 GOOGLE SHEETS

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT0xk01tNw0zCo0mgsq1PYv6Gk4ptl_kv11QfEF4s0aSZDD8wAxym3jnNdEMHCOH_XriaQkw6sh6HTD/pub?output=csv";

// 🔥 ELEMENTOS

const countryGrid =
document.getElementById("countryGrid");

const radioGrid =
document.getElementById("radioGrid");

const countriesSection =
document.getElementById("countriesSection");

const radiosSection =
document.getElementById("radiosSection");

const countryTitle =
document.getElementById("countryTitle");

const countryFilter =
document.getElementById("countryFilter");

const pagination =
document.getElementById("pagination");

// 🔥 CONFIG

const itemsPerPage = 12;

let currentPage = 1;

let radios = [];

// 🔥 BANDERAS OFICIALES

function banderaPais(pais){

    if(!pais){

        return "https://flagcdn.com/w160/un.png";

    }

    pais = pais
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");

    const flags = {

        "argentina":"ar",
        "bolivia":"bo",
        "brasil":"br",
        "brazil":"br",
        "canada":"ca",
        "chile":"cl",
        "colombia":"co",
        "costa rica":"cr",
        "cuba":"cu",
        "ecuador":"ec",
        "el salvador":"sv",
        "espana":"es",
        "estados unidos":"us",
        "usa":"us",
        "guatemala":"gt",
        "honduras":"hn",
        "mexico":"mx",
        "nicaragua":"ni",
        "panama":"pa",
        "paraguay":"py",
        "peru":"pe",
        "puerto rico":"pr",
        "republica dominicana":"do",
        "uruguay":"uy",
        "venezuela":"ve",
        "alemania":"de",
        "francia":"fr",
        "italia":"it",
        "portugal":"pt",
        "reino unido":"gb",
        "japon":"jp",
        "china":"cn",
        "corea del sur":"kr",
        "india":"in",
        "turquia":"tr",
        "rusia":"ru",
        "australia":"au"

    };

    const code =
    flags[pais] || "un";

    return `https://flagcdn.com/w160/${code}.png`;

}

// 🔥 LEER CSV

Papa.parse(sheetURL,{

    download:true,

    skipEmptyLines:true,

    complete:function(results){

        radios = results.data;

        radios.shift();

        radios.reverse();

        crearFiltro();

        mostrarPaises();

    }

});

// 🔥 CREAR FILTRO

function crearFiltro(){

    const paises = [];

    radios.forEach(cols=>{

        const pais = cols[5];

        if(
            pais &&
            !paises.includes(pais)
        ){

            paises.push(pais);

        }

    });

    paises.sort();

    paises.forEach(pais=>{

        const option =
        document.createElement("option");

        option.value = pais;

        option.textContent = pais;

        countryFilter.appendChild(option);

    });

}

// 🔥 MOSTRAR PAISES

function mostrarPaises(){

    countryGrid.innerHTML = "";

    const filtro =
    countryFilter.value;

    const paises = {};

    radios.forEach(cols=>{

        const pais =
        cols[5] || "Otros";

        if(
            filtro &&
            pais !== filtro
        ){
            return;
        }

        if(!paises[pais]){

            paises[pais] = 0;

        }

        paises[pais]++;

    });

    const paisesArray =
    Object.entries(paises);

    const totalPages =
    Math.ceil(
        paisesArray.length /
        itemsPerPage
    );

    const start =
    (currentPage - 1) *
    itemsPerPage;

    const end =
    start + itemsPerPage;

    const currentItems =
    paisesArray.slice(start,end);

    currentItems.forEach(item=>{

        const pais = item[0];

        const total = item[1];

        const card =
        document.createElement("div");

        card.className =
        "country-card";

        card.onclick = ()=>{

            mostrarRadiosPais(pais);

        };

        card.innerHTML = `

            <div class="country-flag">

                <img src="${banderaPais(pais)}">

            </div>

            <div class="country-name">

                ${pais}

            </div>

            <div class="country-total">

                ${total} emisoras

            </div>

        `;

        countryGrid.appendChild(card);

    });

}

</script>

</body>
</html>
