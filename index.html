<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<meta
name="theme-color"
content="#0f172a">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<title>RADIOS MULTIPLES</title>

<style>

/* 🔥 RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* 🔥 BODY */

html,
body{

width:100%;
min-height:100%;
overflow-x:hidden;

font-family:
'Poppins',
sans-serif;

background-image:
linear-gradient(
rgba(2,6,23,.88),
rgba(2,6,23,.92)
),
url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:#fff;

}

/* 🔥 APP */

.radio-app{

width:100%;
min-height:100vh;
padding-bottom:30px;

}

/* 🔥 HEADER */

.app-header{

position:sticky;
top:0;
z-index:999;

width:100%;

padding:12px 14px;

background:
linear-gradient(
180deg,
rgba(15,23,42,.96),
rgba(17,24,39,.96)
);

backdrop-filter:blur(12px);

border-bottom:
1px solid rgba(255,255,255,.05);

box-shadow:
0 4px 14px rgba(0,0,0,.25);

}

/* 🔥 HEADER CONTENT */

.header-content{

display:flex;
align-items:center;
justify-content:center;
gap:14px;

}

/* 🔥 LOGO */

.app-logo{

width:64px;
height:64px;

border-radius:18px;

object-fit:cover;

background:#fff;

padding:4px;

box-shadow:
0 6px 16px rgba(0,0,0,.40);

}

/* 🔥 INFO */

.app-info{

display:flex;
flex-direction:column;

}

/* 🔥 NOMBRE */

.app-name{

font-size:18px;

font-weight:800;

letter-spacing:1px;

text-transform:uppercase;

line-height:1.2;

}

/* 🔥 SUBTITLE */

.app-subtitle{

margin-top:3px;

font-size:11px;

color:
rgba(255,255,255,.70);

}

/* 🔥 CONTENT */

.content{

padding:14px;

}

/* 🔥 FILTRO */

.filter-box{

margin-bottom:16px;

}

#countryFilter{

width:100%;

padding:14px;

border:none;
outline:none;

border-radius:16px;

background:
rgba(17,24,39,.90);

backdrop-filter:blur(10px);

color:#fff;

font-size:14px;

font-weight:600;

}

/* 🔥 GRID */

.country-grid,
.radio-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:12px;

}

/* 🔥 CARDS */

.country-card,
.radio-card{

position:relative;

overflow:hidden;

background:
linear-gradient(
180deg,
rgba(30,41,59,.95),
rgba(17,24,39,.95)
);

backdrop-filter:blur(10px);

border-radius:22px;

padding:14px 8px;

text-align:center;

cursor:pointer;

transition:.25s;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 8px 18px rgba(0,0,0,.25);

}

.country-card:hover,
.radio-card:hover{

transform:
translateY(-4px);

}

/* 🔥 BANDERAS */

.country-flag img{

width:62px;
height:44px;

object-fit:cover;

border-radius:10px;

margin-bottom:10px;

background:#fff;

border:
2px solid rgba(255,255,255,.08);

}

/* 🔥 LOGOS */

.radio-logo{

width:74px;
height:74px;

object-fit:cover;

border-radius:20px;

margin-bottom:10px;

border:
2px solid rgba(255,255,255,.08);

box-shadow:
0 6px 16px rgba(0,0,0,.30);

}

/* 🔥 TEXTOS */

.country-name,
.radio-name{

font-size:11px;

font-weight:700;

line-height:1.4;

word-break:break-word;

}

.country-total{

margin-top:5px;

font-size:9px;

color:#94a3b8;

}

/* 🔥 TITULO */

.app-title{

text-align:center;

margin-bottom:18px;

font-size:20px;

font-weight:700;

}

/* 🔥 BACK */

.back-btn{

display:inline-flex;

align-items:center;
justify-content:center;

padding:12px 16px;

margin-bottom:18px;

border-radius:16px;

background:
rgba(17,24,39,.92);

font-weight:700;

cursor:pointer;

}

/* 🔥 PAGINACION */

.pagination{

margin-top:24px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:8px;

}

/* 🔥 BOTON PAGINA */

.page-btn{

width:40px;
height:40px;

border:none;

border-radius:14px;

background:
rgba(17,24,39,.92);

color:#fff;

font-weight:700;

cursor:pointer;

}

.page-btn.active{

background:#fff;

color:#111827;

}

/* 🔥 HIDDEN */

.hidden{

display:none;

}

/* 🔥 MOBILE */

@media(max-width:480px){

.country-grid,
.radio-grid{

grid-template-columns:
repeat(3,1fr);

gap:10px;

}

.radio-logo{

width:66px;
height:66px;

}

.country-flag img{

width:56px;
height:40px;

}

.app-logo{

width:58px;
height:58px;

}

.app-name{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="radio-app">

<!-- 🔥 HEADER -->

<div class="app-header">

<div class="header-content">

<img
class="app-logo"
src="4008656_ico.png">

<div class="app-info">

<div class="app-name">

RADIOS MULTIPLES

</div>

<div class="app-subtitle">

Radios online en vivo

</div>

</div>

</div>

</div>

<!-- 🔥 CONTENT -->

<div class="content">

<!-- 🔥 FILTRO -->

<div class="filter-box">

<select id="countryFilter">

<option value="">

Todos los países

</option>

</select>

</div>

<!-- 🔥 COUNTRIES -->

<div id="countriesSection">

<div
class="country-grid"
id="countryGrid"></div>

<div
class="pagination"
id="pagination"></div>

</div>

<!-- 🔥 RADIOS -->

<div
id="radiosSection"
class="hidden">

<div
class="back-btn"
onclick="volverPaises()">

← Volver

</div>

<div
class="app-title"
id="countryTitle"></div>

<div
class="radio-grid"
id="radioGrid"></div>

</div>

</div>

</div>

<!-- 🔥 PAPAPARSE -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

// 🔥 GOOGLE SHEET

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT0xk01tNw0zCo0mgsq1PYv6Gk4ptl_kv11QfEF4s0aSZDD8wAxym3jnNdEMHCOH_XriaQkw6sh6HTD/pub?output=csv";

// 🔥 ELEMENTOS

const countryGrid =
document.getElementById("countryGrid");

const radioGrid =
document.getElementById("radioGrid");

const countriesSection =
document.getElementById("countriesSection");

const radiosSection =
document.getElementById("radiosSection");

const countryTitle =
document.getElementById("countryTitle");

const countryFilter =
document.getElementById("countryFilter");

const pagination =
document.getElementById("pagination");

// 🔥 CONFIG

const itemsPerPage = 9;

let currentPage = 1;

let radios = [];

// 🔥 BANDERAS

function banderaPais(pais){

if(!pais){

return "https://flagcdn.com/w160/un.png";

}

pais = pais
.toLowerCase()
.trim()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

const flags = {

"argentina":"ar",
"bolivia":"bo",
"brasil":"br",
"brazil":"br",
"canada":"ca",
"chile":"cl",
"colombia":"co",
"costa rica":"cr",
"cuba":"cu",
"ecuador":"ec",
"el salvador":"sv",
"espana":"es",
"estados unidos":"us",
"usa":"us",
"guatemala":"gt",
"honduras":"hn",
"mexico":"mx",
"nicaragua":"ni",
"panama":"pa",
"paraguay":"py",
"peru":"pe",
"puerto rico":"pr",
"republica dominicana":"do",
"uruguay":"uy",
"venezuela":"ve"

};

const code =
flags[pais] || "un";

return `https://flagcdn.com/w160/${code}.png`;

}

// 🔥 CARGAR CSV

Papa.parse(sheetURL,{

download:true,

skipEmptyLines:true,

complete:function(results){

radios = results.data;

radios.shift();

radios.reverse();

crearFiltro();

mostrarPaises();

}

});

// 🔥 FILTRO

function crearFiltro(){

const paises = [];

radios.forEach(cols=>{

const pais = cols[5];

if(
pais &&
!paises.includes(pais)
){

paises.push(pais);

}

});

paises.sort();

paises.forEach(pais=>{

const option =
document.createElement("option");

option.value = pais;

option.textContent = pais;

countryFilter.appendChild(option);

});

}

// 🔥 MOSTRAR PAISES

function mostrarPaises(){

countryGrid.innerHTML = "";

const filtro =
countryFilter.value;

const paises = {};

radios.forEach(cols=>{

const pais =
cols[5] || "Otros";

if(
filtro &&
pais !== filtro
){
return;
}

if(!paises[pais]){

paises[pais] = 0;

}

paises[pais]++;

});

const paisesArray =
Object.entries(paises);

const totalPages =
Math.ceil(
paisesArray.length /
itemsPerPage
);

const start =
(currentPage - 1) *
itemsPerPage;

const end =
start + itemsPerPage;

const currentItems =
paisesArray.slice(start,end);

currentItems.forEach(item=>{

const pais = item[0];

const total = item[1];

const card =
document.createElement("div");

card.className =
"country-card";

card.onclick = ()=>{

mostrarRadiosPais(pais);

};

card.innerHTML = `

<div class="country-flag">

<img src="${banderaPais(pais)}">

</div>

<div class="country-name">

${pais}

</div>

<div class="country-total">

${total} emisoras

</div>

`;

countryGrid.appendChild(card);

});

crearPaginacion(totalPages);

}

// 🔥 PAGINACION

function crearPaginacion(totalPages){

pagination.innerHTML = "";

for(let i=1;i<=totalPages;i++){

const btn =
document.createElement("button");

btn.className =
"page-btn";

if(i===currentPage){

btn.classList.add("active");

}

btn.innerText = i;

btn.onclick = ()=>{

currentPage = i;

mostrarPaises();

window.scrollTo({

top:0,
behavior:"smooth"

});

};

pagination.appendChild(btn);

}

}

// 🔥 MOSTRAR RADIOS

function mostrarRadiosPais(pais){

countriesSection.classList.add(
"hidden"
);

radiosSection.classList.remove(
"hidden"
);

countryTitle.innerHTML = `

<img
src="${banderaPais(pais)}"
style="
width:38px;
height:28px;
border-radius:8px;
vertical-align:middle;
margin-right:10px;
">

${pais}

`;

radioGrid.innerHTML = "";

const filtradas =
radios.filter(cols=>

(cols[5] || "") === pais

);

filtradas.forEach(cols=>{

const nombre =
cols[1] || "";

const logo =
cols[2] || "";

const stream =
cols[3] || "";

const card =
document.createElement("div");

card.className =
"radio-card";

card.onclick = ()=>{

window.location.href =

"player.html?nombre=" +
encodeURIComponent(nombre)

+

"&logo=" +
encodeURIComponent(logo)

+

"&stream=" +
encodeURIComponent(stream)

+

"&pais=" +
encodeURIComponent(pais);

};

card.innerHTML = `

<img
class="radio-logo"
src="${logo}"
onerror="
this.src='https://via.placeholder.com/150';
">

<div class="radio-name">

${nombre}

</div>

`;

radioGrid.appendChild(card);

});

}

// 🔥 VOLVER

function volverPaises(){

radiosSection.classList.add(
"hidden"
);

countriesSection.classList.remove(
"hidden"
);

}

// 🔥 EVENTO FILTRO

countryFilter.addEventListener(
"change",
()=>{

currentPage = 1;

mostrarPaises();

}
);

</script>

</body>
</html>
